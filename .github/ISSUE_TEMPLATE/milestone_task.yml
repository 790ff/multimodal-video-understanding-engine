name: Milestone task
description: Track implementation work from the software engineering specification.
title: "[M#] "
labels: ["type:task"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be completed?
      placeholder: Implement upload endpoint and metadata persistence.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
      placeholder: Include API contract, validation, repository work, and tests.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that prove this issue is done.
      placeholder: |
        - Uploading mp4 and mov files succeeds.
        - Unsupported extensions return a safe 400 error.
        - Tests cover success and validation paths.
    validations:
      required: true
